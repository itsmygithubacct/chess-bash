name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} build and test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Build warning-clean
        run: |
          make clean
          make -j"$(nproc)" CFLAGS="-O2 -g -Wall -Wextra -Werror -std=c11 -D_FORTIFY_SOURCE=3"

      - name: Validate assets and run full tests
        run: |
          make validate-assets
          make test CFLAGS="-O2 -g -Wall -Wextra -Werror -std=c11 -D_FORTIFY_SOURCE=3"

      - name: Staged install smoke test with restrictive umask
        run: |
          stage="$RUNNER_TEMP/stage-$CC"
          renders="$RUNNER_TEMP/installed-renders-$CC"
          rm -rf "$stage" "$renders"
          mkdir -p "$renders"

          (umask 077; make DESTDIR="$stage" PREFIX=/usr install)

          test "$(stat -c %a "$stage/usr/bin/chess-bash")" = 755
          test "$(stat -c %a "$stage/usr/share/man/man6/chess-bash.6")" = 644
          test -z "$(find "$stage/usr/share/chess-bash" -type d ! -perm 0755 -print -quit)"
          test -z "$(find "$stage/usr/share/chess-bash" -type f ! -perm 0644 -print -quit)"

          "$stage/usr/bin/chess-bash" --version
          "$stage/usr/bin/chess-bash" --rules-test
          (cd "$renders" && CHESS_BASH_RENDER_DIR="$renders" \
            "$stage/usr/bin/chess-bash" --render-test 42)
          test "$(find "$renders" -maxdepth 1 -type f -name 'render_*.ppm' | wc -l)" -eq 21

          make DESTDIR="$stage" PREFIX=/usr uninstall
          test ! -e "$stage/usr/bin/chess-bash"
          test ! -e "$stage/usr/share/chess-bash"
          test ! -e "$stage/usr/share/man/man6/chess-bash.6"

  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build and analysis dependencies
        run: sudo apt-get update && sudo apt-get install -y valgrind zlib1g-dev

      - name: Build with debug information
        run: |
          make clean
          make -j"$(nproc)" all tests/engine-lifecycle \
            CFLAGS="-O1 -g -Wall -Wextra -Werror -std=c11 -D_FORTIFY_SOURCE=3"

      - name: Run practical memory checks
        run: |
          valgrind --quiet --error-exitcode=99 --leak-check=full \
            --show-leak-kinds=definite,indirect \
            --errors-for-leak-kinds=definite,indirect \
            ./chess-bash --rules-test
          valgrind --quiet --error-exitcode=99 --leak-check=full \
            --show-leak-kinds=definite,indirect \
            --errors-for-leak-kinds=definite,indirect \
            ./chess-bash --selftest 2026 500
          valgrind --quiet --error-exitcode=99 --leak-check=full \
            --show-leak-kinds=definite,indirect \
            --errors-for-leak-kinds=definite,indirect \
            ./tests/engine-lifecycle ./tests/fake-uci.sh
